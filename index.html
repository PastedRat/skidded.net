--- index.html (原始)


+++ index.html (修改后)
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skidded.net</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* Modern Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            position: relative;
            padding: 10px 0;
            transition: all 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #ff006e, #8338ec);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: #ff006e;
        }

        /* Hamburger Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 30px;
            height: 3px;
            background: #fff;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 80px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 20px rgba(255, 0, 110, 0.5));
            }
            to {
                filter: drop-shadow(0 0 40px rgba(131, 56, 236, 0.8));
            }
        }

        .hero p {
            font-size: 24px;
            color: #aaa;
            margin-bottom: 50px;
        }

        /* Script Kiddies List */
        .kiddies-section {
            padding: 100px 50px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 48px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 60px;
            background: linear-gradient(90deg, #ff006e, #8338ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .kiddies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .kiddie-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .kiddie-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.1), rgba(131, 56, 236, 0.1));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .kiddie-card:hover::before {
            opacity: 1;
        }

        .kiddie-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 0, 110, 0.5);
            box-shadow: 0 20px 40px rgba(255, 0, 110, 0.3);
        }

        .kiddie-name {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            position: relative;
            z-index: 1;
        }

        .kiddie-card:nth-child(1) .kiddie-name {
            background: linear-gradient(90deg, #ff006e, #ff4d8d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .kiddie-card:nth-child(2) .kiddie-name {
            background: linear-gradient(90deg, #8338ec, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .kiddie-card:nth-child(3) .kiddie-name {
            background: linear-gradient(90deg, #3a86ff, #00b4d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .kiddie-card:nth-child(4) .kiddie-name {
            background: linear-gradient(90deg, #06d6a0, #118ab2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .more-soon {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            font-size: 28px;
            font-weight: 600;
            color: #666;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            margin-top: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                border-color: rgba(255, 255, 255, 0.2);
                color: #666;
            }
            50% {
                border-color: rgba(255, 0, 110, 0.5);
                color: #ff006e;
            }
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            color: #666;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 20px;
            }

            .nav-links {
                position: fixed;
                top: 70px;
                right: -100%;
                width: 100%;
                height: calc(100vh - 70px);
                background: rgba(15, 15, 15, 0.98);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                transition: right 0.4s ease;
            }

            .nav-links.active {
                right: 0;
            }

            .hamburger {
                display: flex;
            }

            .hamburger.active span:nth-child(1) {
                transform: rotate(45deg) translate(5px, 5px);
            }

            .hamburger.active span:nth-child(2) {
                opacity: 0;
            }

            .hamburger.active span:nth-child(3) {
                transform: rotate(-45deg) translate(7px, -6px);
            }

            .hero h1 {
                font-size: 48px;
            }

            .hero p {
                font-size: 18px;
            }

            .section-title {
                font-size: 36px;
            }

            .kiddies-section {
                padding: 60px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="logo">skidded.net</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#list">Script Kiddies</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <h1>skidded.net</h1>
        <p>The ultimate script kiddie hall of fame</p>
    </section>

    <!-- Script Kiddies List -->
    <section class="kiddies-section" id="list">
        <h2 class="section-title">Our Script Kiddies List</h2>
        <div class="kiddies-grid">
            <div class="kiddie-card">
                <div class="kiddie-name">Gxentry</div>
            </div>
            <div class="kiddie-card">
                <div class="kiddie-name">Riley</div>
            </div>
            <div class="kiddie-card">
                <div class="kiddie-name">Ham</div>
            </div>
            <div class="kiddie-card">
                <div class="kiddie-name">Bred</div>
            </div>
            <div class="more-soon">MORE SOON...</div>
        </div>
    </section>

    <!-- Footer -->
    <footer id="contact">
        <p>&copy; 2024 skidded.net | All rights reserved</p>
    </footer>

    <script>
        // Mobile Menu Toggle
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        // Close menu when clicking on a link
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
            });
        });

        // Smooth scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Scroll animation for nav
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) {
                nav.style.background = 'rgba(15, 15, 15, 0.98)';
                nav.style.boxShadow = '0 5px 20px rgba(0, 0, 0, 0.5)';
            } else {
                nav.style.background = 'rgba(15, 15, 15, 0.9)';
                nav.style.boxShadow = 'none';
            }
        });
    </script>
</body>
</html>
